<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDE Study Dashboard</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f5f9;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --surface3: #e7ebf3;
      --border: rgba(20, 32, 51, 0.1);
      --border2: rgba(20, 32, 51, 0.2);
      --text: #142033;
      --muted: #3f4d63;
      --faint: #5d6b82;
      --accent: #2f6fd6;
      --accent-dim: rgba(47, 111, 214, 0.14);
      --accent-dim2: rgba(47, 111, 214, 0.08);
      --green: #168f63;
      --green-dim: rgba(22, 143, 99, 0.13);
      --amber: #b26a00;
      --amber-dim: rgba(178, 106, 0, 0.14);
      --coral: #cc4747;
      --coral-dim: rgba(204, 71, 71, 0.14);
      --blue: #2f6fd6;
      --blue-dim: rgba(47, 111, 214, 0.12);
      --purple: #8a4fd0;
      --purple-dim: rgba(138, 79, 208, 0.14);
      --p1: #2f6fd6;
      --p2: #c67a00;
      --p3: #8a4fd0;
      --p4: #168f63;
      --p5: #cc4747;
      --mono: 'DM Mono', monospace;
      --serif: 'Instrument Serif', serif;
      --sans: 'DM Sans', sans-serif;
      --r: 10px;
      --r-sm: 6px;
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0e0e10;
      --surface: #16161a;
      --surface2: #1e1e24;
      --surface3: #26262e;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #e8e8f0;
      --muted: #8888a0;
      --faint: #44445a;
      --accent: #7c6af7;
      --accent-dim: rgba(124, 106, 247, 0.15);
      --accent-dim2: rgba(124, 106, 247, 0.08);
      --green: #3ecf8e;
      --green-dim: rgba(62, 207, 142, 0.12);
      --amber: #f5a623;
      --amber-dim: rgba(245, 166, 35, 0.12);
      --coral: #f06b6b;
      --coral-dim: rgba(240, 107, 107, 0.12);
      --blue: #5b9cf6;
      --blue-dim: rgba(91, 156, 246, 0.12);
      --purple: #c084fc;
      --purple-dim: rgba(192, 132, 252, 0.12);
      --p1: #5b9cf6;
      --p2: #f5a623;
      --p3: #c084fc;
      --p4: #3ecf8e;
      --p5: #f06b6b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.2s ease, color 0.2s ease;
    }

    /* LAYOUT */
    .shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* HEADER */
    header {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      gap: 16px;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      justify-content: center;
    }

    .date-nav-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      border-radius: var(--r-sm);
      padding: 5px 10px;
      font-size: 13px;
      font-family: var(--sans);
      transition: all 0.15s;
    }

    .date-nav-btn:hover {
      background: var(--surface2);
      color: var(--text);
    }

    .current-date-display {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      min-width: 130px;
      text-align: center;
    }

    .today-btn {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      cursor: pointer;
      border-radius: var(--r-sm);
      padding: 4px 10px;
      font-size: 12px;
      font-family: var(--sans);
      transition: all 0.15s;
    }

    .today-btn:hover {
      background: var(--accent);
      color: white;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      cursor: pointer;
      border-radius: var(--r-sm);
      padding: 5px 10px;
      font-size: 12px;
      font-family: var(--sans);
      transition: all 0.15s;
    }

    .theme-toggle:hover {
      background: var(--surface3);
    }

    .auth-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      max-width: 180px;
    }

    .auth-name {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .auth-avatar {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      object-fit: cover;
      border: 1px solid var(--border2);
      background: var(--surface2);
    }

    .auth-avatar-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
    }

    .sync-status {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--faint);
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface2);
      white-space: nowrap;
    }

    .sync-status[data-tone="success"] {
      color: var(--green);
      border-color: var(--green);
      background: var(--green-dim);
    }

    .sync-status[data-tone="loading"] {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim2);
    }

    .sync-status[data-tone="error"] {
      color: var(--coral);
      border-color: var(--coral);
      background: var(--coral-dim);
    }

    .phase-pill {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    .progress-mini {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .progress-mini-bar {
      width: 80px;
      height: 3px;
      background: var(--surface3);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-mini-fill {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* SIDEBAR */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px 0;
    }

    aside::-webkit-scrollbar {
      width: 4px;
    }

    aside::-webkit-scrollbar-track {
      background: transparent;
    }

    aside::-webkit-scrollbar-thumb {
      background: var(--surface3);
      border-radius: 2px;
    }

    .sidebar-section-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 16px 8px;
      margin-top: 8px;
    }

    :root[data-theme="dark"] .sidebar-section-label {
      color: #c0c6d9;
    }

    .phase-group {
      margin-bottom: 4px;
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      cursor: pointer;
      border-radius: 0;
      transition: background 0.1s;
    }

    .phase-header:hover {
      background: var(--surface2);
    }

    .phase-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .phase-name {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
      font-weight: 400;
    }

    .phase-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--faint);
    }

    .week-list {
      padding: 0 8px 4px 24px;
      display: none;
    }

    .week-list.open {
      display: block;
    }

    .week-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 12px;
      color: var(--faint);
      transition: all 0.1s;
    }

    .week-item:hover {
      background: var(--surface2);
      color: var(--muted);
    }

    .week-item.active {
      background: var(--accent-dim2);
      color: var(--accent);
    }

    .week-item.current-week {
      background: color-mix(in srgb, var(--week-highlight, #3ecf8e) 20%, transparent);
      color: var(--week-highlight, #3ecf8e);
    }

    .week-item.current-week .week-dot {
      opacity: 0.95;
    }

    :root[data-theme="dark"] .week-item {
      color: #c6cada;
    }

    :root[data-theme="dark"] .week-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #eef1ff;
    }

    :root[data-theme="dark"] .week-item.active {
      background: rgba(124, 106, 247, 0.24);
      color: #f3f4ff;
    }

    :root[data-theme="dark"] .week-item.current-week {
      background: color-mix(in srgb, var(--week-highlight, #3ecf8e) 30%, transparent);
      color: color-mix(in srgb, var(--week-highlight, #3ecf8e) 70%, white);
    }

    .week-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      opacity: 0.5;
    }

    /* MAIN */
    main {
      overflow-y: auto;
      padding: 24px;
      background: var(--bg);
    }

    main::-webkit-scrollbar {
      width: 6px;
    }

    main::-webkit-scrollbar-track {
      background: transparent;
    }

    main::-webkit-scrollbar-thumb {
      background: var(--surface3);
      border-radius: 3px;
    }

    /* DAY HEADER */
    .day-header {
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .day-number {
      font-family: var(--serif);
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 2px;
    }

    .day-title {
      font-family: var(--serif);
      font-size: 32px;
      color: var(--text);
      font-weight: 400;
      line-height: 1.1;
    }

    .day-phase-tag {
      font-family: var(--mono);
      font-size: 11px;
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .no-data-msg {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .no-data-msg h2 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 8px;
      color: var(--faint);
    }

    /* GRID LAYOUT */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .col-span-2 {
      grid-column: span 2;
    }

    .col-span-full {
      grid-column: 1 / -1;
    }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
    }

    .card-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    :root[data-theme="dark"] .card-label {
      color: #c4cade;
    }

    .card-label-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .card-head .card-label {
      margin-bottom: 0;
    }

    .card-edit-btn {
      width: 24px;
      height: 24px;
      border: 1px solid color-mix(in srgb, var(--editor-accent, var(--accent)) 35%, var(--border2));
      border-radius: 6px;
      background: color-mix(in srgb, var(--editor-accent, var(--accent)) 10%, var(--surface2));
      color: color-mix(in srgb, var(--editor-accent, var(--accent)) 70%, var(--muted));
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .card-edit-btn:hover {
      background: color-mix(in srgb, var(--editor-accent, var(--accent)) 17%, var(--surface3));
      border-color: var(--editor-accent, var(--accent));
      color: var(--editor-accent, var(--accent));
    }

    .card-editor {
      margin-bottom: 12px;
      padding: 10px;
      border: 1px dashed color-mix(in srgb, var(--editor-accent, var(--accent)) 45%, var(--border2));
      border-radius: var(--r-sm);
      background: color-mix(in srgb, var(--editor-accent, var(--accent)) 8%, var(--surface2));
    }

    .card-editor-help {
      font-size: 11px;
      color: color-mix(in srgb, var(--editor-accent, var(--accent)) 52%, var(--faint));
      margin-bottom: 6px;
    }

    .card-editor-input {
      width: 100%;
      resize: vertical;
      border: 1px solid color-mix(in srgb, var(--editor-accent, var(--accent)) 30%, var(--border2));
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.45;
      padding: 8px 10px;
      min-height: 78px;
    }

    .card-editor-input:focus {
      outline: none;
      border-color: var(--editor-accent, var(--accent));
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--editor-accent, var(--accent)) 22%, transparent);
    }

    .card-editor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .editor-btn {
      border: 1px solid color-mix(in srgb, var(--editor-accent, var(--accent)) 28%, var(--border2));
      border-radius: 6px;
      background: color-mix(in srgb, var(--editor-accent, var(--accent)) 6%, var(--surface));
      color: color-mix(in srgb, var(--editor-accent, var(--accent)) 65%, var(--muted));
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .editor-btn:hover {
      border-color: var(--editor-accent, var(--accent));
      color: var(--editor-accent, var(--accent));
      background: color-mix(in srgb, var(--editor-accent, var(--accent)) 12%, var(--surface2));
    }

    .editor-btn-primary {
      background: var(--editor-accent, var(--accent));
      border-color: var(--editor-accent, var(--accent));
      color: #fff;
    }

    .editor-btn-primary:hover {
      background: color-mix(in srgb, var(--editor-accent, var(--accent)) 88%, black);
      border-color: color-mix(in srgb, var(--editor-accent, var(--accent)) 88%, black);
      color: #fff;
    }

    /* TASK ITEMS */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      transition: border-color 0.15s;
      cursor: default;
      min-width: 0;
      max-width: 100%;
    }

    .task-item:hover {
      border-color: var(--border2);
    }

    .task-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .task-check {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .task-check.disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .task-check.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .task-check.checked::after {
      content: '';
      display: block;
      width: 8px;
      height: 5px;
      border-left: 1.5px solid white;
      border-bottom: 1.5px solid white;
      transform: rotate(-45deg) translateY(-1px);
    }

    /* PROBLEM CARD */
    .problem-display {
      padding: 14px 16px;
      background: var(--surface2);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .problem-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .problem-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .diff-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .diff-easy {
      background: var(--green-dim);
      color: var(--green);
    }

    .diff-med {
      background: var(--amber-dim);
      color: var(--amber);
    }

    .diff-hard {
      background: var(--coral-dim);
      color: var(--coral);
    }

    /* BUILD CARD */
    .build-task {
      padding: 14px 16px;
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
    }

    .build-task span {
      flex: 1;
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .task-link {
      color: var(--accent);
      text-decoration: none;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .task-link:hover {
      text-decoration: underline;
    }

    .task-link-btn {
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      font: inherit;
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      text-align: left;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .task-link-btn:hover {
      color: var(--accent-soft);
    }

    :root[data-theme="dark"] .task-link {
      color: #9fc2ff;
    }

    :root[data-theme="dark"] .task-link:hover {
      color: #c7dcff;
    }

    :root[data-theme="dark"] .task-link-btn {
      color: #9fc2ff;
    }

    :root[data-theme="dark"] .task-link-btn:hover {
      color: #c7dcff;
    }

    /* TIP CARD */
    .tip-text {
      padding: 14px 16px;
      background: var(--accent-dim2);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-family: var(--serif);
      font-style: italic;
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      min-width: 0;
      max-width: 100%;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    /* REVISE ITEMS */
    .revise-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      min-width: 0;
      max-width: 100%;
    }

    .revise-icon {
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 6px;
      border-radius: 3px;
      background: var(--amber-dim);
      color: var(--amber);
      flex-shrink: 0;
    }

    .revise-text {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    /* EMPTY STATES */
    .empty-revise {
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: var(--r-sm);
      font-size: 12px;
      color: var(--faint);
      font-family: var(--mono);
    }

    :root[data-theme="dark"] .empty-revise {
      color: #cfd5e6;
    }

    /* PROGRESS OVERVIEW */
    .phase-progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .phase-prog-label {
      font-size: 11px;
      color: var(--muted);
      width: 80px;
      flex-shrink: 0;
    }

    .phase-prog-bar {
      flex: 1;
      height: 4px;
      background: var(--surface3);
      border-radius: 2px;
      overflow: hidden;
    }

    .phase-prog-fill {
      height: 4px;
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .phase-prog-pct {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--faint);
      width: 32px;
      text-align: right;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 2px;
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--faint);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: 56px auto 1fr;
      }

      aside {
        display: none;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .col-span-2 {
        grid-column: 1;
      }

      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* SCROLLED-IN ANIMATION */
    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fadein {
      animation: fadein 0.3s ease forwards;
    }

    .off-plan-msg {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 40px;
      text-align: center;
      color: var(--muted);
    }

    .off-plan-msg h3 {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ACTIVITY GRAPH */
    .activity-graph-card {
      margin-top: 16px;
    }

    .activity-graph-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .activity-graph-stats {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .activity-stat {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--faint);
    }

    .activity-stat strong {
      color: var(--text);
      font-weight: 500;
    }

    :root[data-theme="dark"] .activity-stat {
      color: #c5cbe0;
    }

    :root[data-theme="dark"] .activity-stat strong {
      color: #f3f5ff;
    }

    .activity-graph-wrapper {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .activity-graph-wrapper::-webkit-scrollbar {
      height: 4px;
    }

    .activity-graph-wrapper::-webkit-scrollbar-track {
      background: transparent;
    }

    .activity-graph-wrapper::-webkit-scrollbar-thumb {
      background: var(--surface3);
      border-radius: 2px;
    }

    .activity-graph-inner {
      display: flex;
      gap: 3px;
      align-items: flex-start;
    }

    .activity-month-labels {
      display: flex;
      gap: 3px;
      margin-bottom: 4px;
      margin-left: 28px;
    }

    .activity-month-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--faint);
      text-align: left;
    }

    .activity-day-labels {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .activity-day-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--faint);
      height: 11px;
      line-height: 11px;
    }

    .activity-col {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .activity-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      background: var(--surface3);
      position: relative;
      cursor: default;
    }

    .activity-cell[data-level="0"] {
      background: var(--surface3);
    }

    :root .activity-cell[data-level="1"] {
      background: #9be9a8;
    }

    :root .activity-cell[data-level="2"] {
      background: #40c463;
    }

    :root .activity-cell[data-level="3"] {
      background: #30a14e;
    }

    :root .activity-cell[data-level="4"] {
      background: #216e39;
    }

    :root[data-theme="dark"] .activity-cell[data-level="1"] {
      background: #0e4429;
    }

    :root[data-theme="dark"] .activity-cell[data-level="2"] {
      background: #006d32;
    }

    :root[data-theme="dark"] .activity-cell[data-level="3"] {
      background: #26a641;
    }

    :root[data-theme="dark"] .activity-cell[data-level="4"] {
      background: #39d353;
    }

    .activity-cell.is-today {
      outline: none;
    }

    .activity-cell.is-future {
      background: color-mix(in srgb, var(--surface2) 40%, transparent);
    }

    .activity-cell[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--text);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 9px;
      padding: 3px 7px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    .activity-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .activity-legend-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--faint);
      margin-right: 2px;
    }

    .activity-legend-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }

    .gate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
      max-width: 620px;
      box-shadow: 0 14px 34px rgba(20, 32, 51, 0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gate-shell {
      min-height: calc(100vh - 56px - 48px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate-badge {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: var(--surface2);
      box-shadow: 0 10px 24px rgba(20, 32, 51, 0.08);
    }

    .gate-badge svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .gate-badge-supabase {
      border-color: rgba(62, 207, 142, 0.28);
      background: linear-gradient(180deg, rgba(62, 207, 142, 0.18), rgba(22, 143, 99, 0.08));
      color: #1a9f6d;
    }

    .gate-badge-github {
      border-color: rgba(20, 32, 51, 0.18);
      background: linear-gradient(180deg, rgba(20, 32, 51, 0.1), rgba(20, 32, 51, 0.04));
      color: #142033;
    }

    :root[data-theme="dark"] .gate-badge-github {
      border-color: rgba(255, 255, 255, 0.1);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
      color: #f3f5ff;
    }

    .gate-card h2 {
      font-family: var(--serif);
      font-size: 28px;
      line-height: 1.1;
      color: var(--text);
    }

    .gate-card p {
      color: var(--muted);
      max-width: 52ch;
    }

    .gate-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .gate-btn {
      appearance: none;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      border-radius: var(--r-sm);
      padding: 8px 14px;
      font-size: 13px;
      font-family: var(--sans);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 18px rgba(47, 111, 214, 0.22);
    }

    .gate-btn:hover {
      transform: translateY(-1px);
    }

    .gate-btn-supabase {
      border-color: #1f9f6a;
      background: linear-gradient(180deg, #38d790, #1f9f6a);
      box-shadow: 0 8px 18px rgba(31, 159, 106, 0.22);
    }

    .gate-btn-github {
      border-color: #111827;
      background: linear-gradient(180deg, #2b3445, #111827);
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.24);
    }

    .gate-code {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      padding: 12px;
      border-radius: var(--r-sm);
      background: var(--surface2);
      border: 1px dashed var(--border2);
      overflow-x: auto;
    }

    .skeleton-dashboard {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .skeleton-block {
      position: relative;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .skeleton-block::after {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.45), transparent);
      animation: skeleton-shimmer 1.25s ease-in-out infinite;
    }

    :root[data-theme="dark"] .skeleton-block::after {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    }

    @keyframes skeleton-shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    .skeleton-line {
      height: 12px;
    }

    .skeleton-line-lg {
      height: 18px;
    }

    .skeleton-line-xl {
      height: 34px;
      border-radius: 16px;
    }

    .skeleton-day-header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 8px;
    }

    .skeleton-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 200px;
    }

    .skeleton-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .skeleton-card-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skeleton-task {
      height: 42px;
      border-radius: var(--r-sm);
    }

    .skeleton-graph {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 210px;
    }

    .skeleton-graph-grid {
      display: grid;
      grid-template-columns: 44px repeat(12, 1fr);
      gap: 8px;
      align-items: end;
    }

    .skeleton-graph-labels {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-top: 14px;
    }

    .skeleton-graph-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .skeleton-graph-cell {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <div class="shell">

    <header>
      <div class="logo">
        <div class="logo-dot"></div>
        sde.study
      </div>

      <div class="header-center">
        <button class="date-nav-btn" id="prev-day">←</button>
        <div class="current-date-display" id="date-display">—</div>
        <button class="date-nav-btn" id="next-day">→</button>
        <button class="today-btn" id="go-today">today</button>
      </div>

      <div class="header-right">
        <div class="progress-mini">
          <div class="progress-mini-bar">
            <div class="progress-mini-fill" id="global-prog-fill"></div>
          </div>
          <span id="global-prog-text">0%</span>
        </div>
        <div class="phase-pill" id="phase-pill">—</div>
        <div class="sync-status" id="sync-status" data-tone="muted">Setup required</div>
        <div class="auth-controls" id="auth-controls"></div>
        <button class="theme-toggle" id="theme-toggle">Dark view</button>
      </div>
    </header>

    <aside id="sidebar">
      <div class="sidebar-section-label">Timeline</div>
      <div id="sidebar-phases"></div>
    </aside>

    <main id="main-content">
      <div class="no-data-msg">
        <h2>Loading your plan...</h2>
      </div>
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="main.js"></script>
</body>

</html>
